name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: gdrive-sync
            archive: gdrive-sync-linux-amd64.tar.gz
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            binary: gdrive-sync.exe
            archive: gdrive-sync-windows-amd64.zip
            cc: x86_64-w64-mingw32-gcc
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: gdrive-sync
            archive: gdrive-sync-darwin-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Install mingw-w64 (Windows cross-compile)
        if: matrix.goos == 'windows'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build frontend
        run: cd frontend && bun install && bun run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc || '' }}
        run: |
          go build -o ${{ matrix.binary }} \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" .

      - name: Archive (tar.gz)
        if: matrix.goos != 'windows'
        run: tar czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Archive (zip)
        if: matrix.goos == 'windows'
        run: zip ${{ matrix.archive }} ${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gdrive-sync-linux-amd64.tar.gz
            gdrive-sync-windows-amd64.zip
            gdrive-sync-darwin-arm64.tar.gz
